<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Baidarka Labs</title>
  <meta name="description" content="A forthcoming initiative to assess the quality of data products intended for analysis by AI agents.">
  <link rel="icon" href="/favicon.svg">
  <style>
    :root { --ink: #0E1733; --teal: #0E6E6B; --paper: #F4F1EB; --mute: #6B6B6B; --line: #D9D3C8; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 64px 32px;
      text-align: center;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 48px;
      font-weight: 400;
      letter-spacing: -.015em;
      line-height: 1;
    }
    p { font-size: 17px; color: var(--mute); max-width: 44ch; line-height: 1.5; margin-top: 16px; }
    footer { padding: 24px 32px; border-top: 1px solid var(--line); text-align: center; font-size: 13px; color: var(--mute); }
    a { color: var(--teal); text-decoration: none; }
    @media (prefers-reduced-motion: no-preference) {
      @keyframes k1 {
        from { transform: translate(0,0) rotate(0deg); }
        to   { transform: translate(2px,-1.5px) rotate(1.2deg); }
      }
      @keyframes k2 {
        from { transform: translate(0,0) rotate(0deg); }
        to   { transform: translate(-1.5px,1px) rotate(-0.8deg); }
      }
      @keyframes k3 {
        from { transform: translate(0,0) rotate(0deg); }
        to   { transform: translate(1px,2px) rotate(-1.5deg); }
      }
      svg:hover .k1 { animation: k1 2.1s ease-in-out infinite alternate; animation-delay: -0.4s; }
      svg:hover .k2 { animation: k2 2.8s ease-in-out infinite alternate; animation-delay: -1.1s; }
      svg:hover .k3 { animation: k3 1.9s ease-in-out infinite alternate; animation-delay: -0.7s; }
    }
  </style>
</head>
<body>
  <main>
    <svg width="280" height="280" viewBox="0 0 200 200" aria-hidden="true">
      <defs>
        <path id="h" d="M959 75H924l-10-7c-250-68-650-68-864-18v25h-45a5 3 0 0 0 0 6H50v25c214 50 614 50 864-18l10-7H959a5 3 0 0 0 0-6"/>
      </defs>
      <g class="k1"><use href="#h" fill="#0E1733" transform="translate(109.32 137.32) rotate(-11) scale(.11321) translate(-482 -78)"/></g>
      <g class="k2"><use href="#h" fill="#0E1733" transform="translate(100 100) rotate(-23) scale(.14465) translate(-482 -78)"/></g>
      <g class="k3"><use href="#h" fill="#0E1733" transform="translate(67.25 79.14) rotate(-6) scale(.10901) translate(-482 -78)"/></g>
    </svg>
    <div>
      <h1>Baidarka Labs</h1>
      <p>A forthcoming initiative to assess the quality of data products intended for analysis by AI agents.</p>
    </div>
  </main>
  <footer>Baidarka Labs is a <a href="https://radiant.earth">Radiant Earth</a> initiative.</footer>
</body>
</html>
